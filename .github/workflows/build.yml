name: Build Mindustry Mod (Desktop + Android)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Забираем репозиторий
    - uses: actions/checkout@v4

    # 2️⃣ Устанавливаем JDK 17
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3️⃣ Устанавливаем Android SDK (для d8)
    - uses: android-actions/setup-android@v2
      with:
        api-level: 33
        build-tools: 33.0.2

    # 4️⃣ Добавляем Build Tools в PATH
    - run: echo "$ANDROID_HOME/build-tools/33.0.2" >> $GITHUB_PATH

    # 5️⃣ Делаем gradlew исполняемым
    - run: chmod +x gradlew

    # 6️⃣ Собираем обычный jar через Gradle
    - run: ./gradlew clean jar

    # 7️⃣ Конвертируем jar в classes.dex
    - run: |
        mkdir -p build/dex
        $ANDROID_HOME/build-tools/33.0.2/d8 --output build/dex build/libs/*.jar

    # 8️⃣ Собираем финальный jar с classes.dex + assets + mod.hjson
    - run: |
        mkdir -p build/libs/temp
        cp -r assets/* build/libs/temp/
        cp mod.hjson build/libs/temp/
        cp build/dex/classes.dex build/libs/temp/
        cd build/libs/temp
        zip -r ../ARX-Alpha-Mod-android.jar .
        cd ..
        rm -rf temp

    # 9️⃣ Загружаем готовый jar как артефакт
    - uses: actions/upload-artifact@v4
      with:
        name: ARX-Alpha-Mod
        path: build/libs/ARX-Alpha-Mod-android.jar
