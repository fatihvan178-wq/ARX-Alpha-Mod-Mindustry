name: Build Mindustry Mod (Desktop + Android)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Забираем репозиторий
    - uses: actions/checkout@v4

    # 2️⃣ Устанавливаем JDK 17
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3️⃣ Устанавливаем Android SDK (для d8)
    - uses: android-actions/setup-android@v2
      with:
        api-level: 33
        build-tools: 33.0.2

    # 4️⃣ Делаем gradlew исполняемым
    - run: chmod +x gradlew

    # 5️⃣ Собираем обычный jar через Gradle
    - run: ./gradlew clean jar

    # 6️⃣ Конвертируем jar в classes.dex
    - run: |
        mkdir -p build/dex
        d8 --output build/dex build/libs/*.jar

    # 7️⃣ Собираем финальный jar с classes.dex + assets + mod.hjson
    - run: |
        cd build/libs
        mkdir temp
        cp ../../assets/* temp/ -r
        cp ../../mod.hjson temp/
        cp ../dex/classes.dex temp/
        cd temp
        zip -r ../ARX-Alpha-Mod-android.jar .
        cd ..
        rm -rf temp

    # 8️⃣ Загружаем готовый jar как артефакт
    - uses: actions/upload-artifact@v4
      with:
        name: ARX-Alpha-Mod
        path: build/libs/ARX-Alpha-Mod.jar
